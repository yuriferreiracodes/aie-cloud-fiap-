$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: recomendador-qc-job
experiment_name: recomendacao-qc-pipeline

inputs:
  produtos:
    type: uri_file
    path: azureml:produtos-qc:1
  n_neighbors: 5

command: >-
  python train.py
  --input-data ${{inputs.produtos}}
  --n-neighbors ${{inputs.n_neighbors}}

environment:
  image: mcr.microsoft.com/azureml/openmpi5.0-ubuntu22.04:latest
  conda_file: conda.yml

compute: azureml:cpu-cluster

# Sobe todos os arquivos desta pasta (train.py + conda.yml) como código do job.
code: .
